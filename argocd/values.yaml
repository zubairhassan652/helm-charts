# charts/argocd/values.yaml
argo-cd:
  global:
    domain: argocd.example.com

  server:
    ingress:
      enabled: true
      controller: nginx
      ingressClassName: nginx
      hostname: argocd.example.com
      annotations:
        nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        nginx.ingress.kubernetes.io/ssl-passthrough: "true"