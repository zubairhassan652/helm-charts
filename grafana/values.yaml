replicaCount: 1

image:
  repository: grafana/grafana
  pullPolicy: IfNotPresent
  tag: "10.2.0"

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: grafana.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: grafana-tls
      hosts:
        - grafana.example.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

grafana:
  admin:
    username: admin
    password: admin123
  datasources:
    prometheus:
      name: Prometheus
      type: prometheus
      url: http://prometheus.monitoring.svc.cluster.local:9090
      access: proxy
      isDefault: true
    kube-state-metrics:
      name: Kube State Metrics
      type: prometheus
      url: http://prometheus.monitoring.svc.cluster.local:9090
      access: proxy
      isDefault: false
  dashboards:
    kubernetes-cluster-monitoring:
      gnetId: 315
      revision: 3
      datasource: Prometheus
    kubernetes-api-server:
      gnetId: 12006
      revision: 1
      datasource: Prometheus
    kubernetes-nodes:
      gnetId: 1860
      revision: 25
      datasource: Prometheus
    kubernetes-persistent-volumes:
      gnetId: 673
      revision: 1
      datasource: Prometheus

persistence:
  enabled: true
  storageClassName: "standard"
  size: 10Gi

nodeSelector: {}
tolerations: []
affinity: {}
